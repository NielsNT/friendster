<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mystery Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14101F;
    --surface: #201A31;
    --line: #352D4E;
    --accent: #FFB84D;
    --accent-deep: #E0902A;
    --text: #F5EFE6;
    --muted: #8D84A6;
    --vinyl: #0B0812;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 24px;
    text-align: center;
    overflow: hidden;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 8vw, 42px);
    line-height: 1.05;
    margin-top: 6px;
  }
  h1 .q { color: var(--accent); }

  /* --- Vinyl play button (het geheime nummer) --- */
  .vinyl-wrap { position: relative; }
  .vinyl {
    width: min(62vw, 260px);
    height: min(62vw, 260px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background:
      radial-gradient(circle at center,
        var(--accent) 0 18%,
        var(--vinyl) 18.5% 100%);
    box-shadow:
      0 0 0 1px var(--line),
      0 18px 50px rgba(0,0,0,0.55),
      inset 0 0 40px rgba(0,0,0,0.6);
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* grooves */
  .vinyl::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: repeating-radial-gradient(circle at center,
      transparent 0 6px,
      rgba(255,255,255,0.05) 6px 7px);
    -webkit-mask: radial-gradient(circle at center, transparent 0 19%, #000 20%);
            mask: radial-gradient(circle at center, transparent 0 19%, #000 20%);
    pointer-events: none;
  }
  /* play / pause glyph op het label */
  .vinyl .glyph {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--vinyl);
    font-size: 26px;
    line-height: 1;
    pointer-events: none;
  }
  .vinyl .glyph .play-icon {
    display: inline-block;
    width: 0; height: 0;
    border-left: 22px solid var(--vinyl);
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 5px;
  }
  .vinyl .glyph .pause-icon {
    display: none;
    width: 22px; height: 28px;
    border-left: 8px solid var(--vinyl);
    border-right: 8px solid var(--vinyl);
  }
  .spinning { animation: spin 2.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .spinning { animation: none; }
  }
  .playing .play-icon { display: none; }
  .playing .pause-icon { display: inline-block; }

  .time {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-size: 22px;
    color: var(--accent);
    min-height: 28px;
  }
  .chip {
    display: inline-block;
    font-size: 13px;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
  }
  .restart {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 20px;
    cursor: pointer;
  }
  .restart:active { background: var(--line); }
  button:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  .hint { font-size: 13px; color: var(--muted); max-width: 320px; }

  /* Spotify embed: aanwezig maar volledig afgedekt */
  .embed-cage {
    position: fixed;
    bottom: 0; left: 0;
    width: 320px; height: 80px;
    overflow: hidden;
    opacity: 0.02;          /* technisch zichtbaar, praktisch onzichtbaar */
    pointer-events: none;   /* niet aanklikbaar, dus ook niet per ongeluk */
    z-index: -1;
  }

  /* Setup-scherm (geen track-parameter) */
  .setup {
    max-width: 420px;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    font-size: 15px;
    line-height: 1.6;
  }
  .setup h2 { font-family: 'Bricolage Grotesque', sans-serif; margin-bottom: 10px; }
  .setup code {
    display: block;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 10px 0;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
  }
  .setup a { color: var(--accent); }
  .err { color: #FF8A7A; font-size: 14px; max-width: 340px; }
</style>
</head>
<body>

<main id="app"></main>
<div class="embed-cage"><div id="embed"></div></div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const rawTrack = params.get('track') || '';
  const rawStart = params.get('start') || '0';
  const app = document.getElementById('app');

  // --- track-ID uit parameter halen (accepteert ID, open.spotify.com-URL of spotify:track:URI)
  function parseTrackId(v) {
    v = decodeURIComponent(v.trim());
    let m = v.match(/track[\/:]([A-Za-z0-9]{22})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9]{22}$/.test(v)) return v;
    return null;
  }

  // --- starttijd: "83" (seconden) of "1:23"
  function parseStart(v) {
    v = v.trim();
    if (/^\d+:\d{1,2}$/.test(v)) {
      const [m, s] = v.split(':').map(Number);
      return m * 60 + s;
    }
    const n = parseInt(v, 10);
    return isNaN(n) ? 0 : Math.max(0, n);
  }

  function fmt(sec) {
    sec = Math.max(0, Math.floor(sec));
    return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }

  const trackId = parseTrackId(rawTrack);
  const startSec = parseStart(rawStart);

  // --- Geen (geldige) track? Toon uitleg. ---
  if (!trackId) {
    app.innerHTML = `
      <div class="setup">
        <h2>Hitster-speler</h2>
        <p>Open deze pagina met een <strong>track</strong>- en <strong>start</strong>-parameter in de link:</p>
        <code>?track=SPOTIFY_TRACK_ID&amp;start=45</code>
        <p>Voorbeeld (Coldplay – Yellow, vanaf 0:42):</p>
        <code><a href="?track=3AJwUDP919kvQ9QcozQPxg&start=42">?track=3AJwUDP919kvQ9QcozQPxg&amp;start=42</a></code>
        <p><strong>start</strong> mag in seconden (<code style="display:inline;padding:2px 6px">45</code>) of als <code style="display:inline;padding:2px 6px">1:23</code>.</p>
      </div>`;
    return;
  }

  // --- Speler-UI ---
  app.innerHTML = `
    <div>
      <div class="eyebrow">Hitster &middot; Ronde</div>
      <h1>Mystery <span class="q">Track</span></h1>
    </div>
    <div class="vinyl-wrap">
      <button class="vinyl" id="disc" aria-label="Afspelen of pauzeren">
        <span class="glyph"><span class="play-icon"></span><span class="pause-icon"></span></span>
      </button>
    </div>
    <div class="time" id="time">&nbsp;</div>
    <span class="chip">Start bij ${fmt(startSec)}</span>
    <button class="restart" id="restart">&#8634; Opnieuw vanaf startpunt</button>
    <p class="hint">Titel en artiest blijven verborgen. Niet spieken &#128584;</p>
    <p class="err" id="err" hidden></p>
  `;
  // flexbox-gap netjes verdelen
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  app.style.alignItems = 'center';
  app.style.gap = '20px';

  const disc = document.getElementById('disc');
  const timeEl = document.getElementById('time');
  const errEl = document.getElementById('err');

  let controller = null;
  let isPaused = true;
  let needsSeek = true;   // eerste keer afspelen: naar startpunt springen
  let ready = false;

  // Spotify iFrame API laden
  const s = document.createElement('script');
  s.src = 'https://open.spotify.com/embed/iframe-api/v1';
  s.async = true;
  s.onerror = () => showErr('Kon de Spotify-speler niet laden. Is er internet?');
  document.body.appendChild(s);

  function showErr(msg) { errEl.textContent = msg; errEl.hidden = false; }

  window.onSpotifyIframeApiReady = (IFrameAPI) => {
    IFrameAPI.createController(
      document.getElementById('embed'),
      { uri: 'spotify:track:' + trackId, width: 300, height: 80 },
      (EmbedController) => {
        controller = EmbedController;
        ready = true;

        controller.addListener('playback_update', (e) => {
          const d = e.data;
          if (!d) return;
          isPaused = d.isPaused;
          disc.classList.toggle('playing', !isPaused);
          disc.classList.toggle('spinning', !isPaused);

          const pos = (d.position || 0) / 1000;
          timeEl.textContent = fmt(pos);

          // Net gestart maar nog vóór het startpunt? Eén keer doorspoelen.
          if (!isPaused && needsSeek && pos < startSec - 1) {
            controller.seek(startSec);
          }
          if (pos >= startSec - 1) needsSeek = false;
        });

        controller.addListener('error', () =>
          showErr('Afspelen lukt niet. Log in de browser in bij Spotify voor het hele nummer (anders hoor je een preview).')
        );
      }
    );
  };

  disc.addEventListener('click', () => {
    if (!ready) return;
    if (isPaused) {
      if (needsSeek) {
        controller.seek(startSec);  // seek start meteen het afspelen op het startpunt
      } else {
        controller.resume ? controller.resume() : controller.play();
      }
    } else {
      controller.pause();
    }
  });

  document.getElementById('restart').addEventListener('click', () => {
    if (!ready) return;
    needsSeek = false;
    controller.seek(startSec);
  });
})();
</script>
</body>
</html>
