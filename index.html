<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Friendster · Mystery Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14101F; --surface: #201A31; --line: #352D4E;
    --accent: #FFB84D; --text: #F5EFE6; --muted: #8D84A6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 20px; text-align: center;
  }
  .eyebrow { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: .22em; color: var(--accent); }

  /* --- de mysteriekaart: zelfde stijl als de geprinte kaartjes --- */
  .card {
    width: min(64vw, 230px); height: min(64vw, 230px);
    border-radius: 18px; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,.55);
    color: #000;
  }
  .card .q { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 96px; line-height: 1; }
  .card .sub { font-size: 13px; font-weight: 700; opacity: .75; }
  .card .brand {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-weight: 700; letter-spacing: .2em;
    border: 1.5px solid #000; border-radius: 999px; padding: 3px 10px;
  }
  /* equalizer verschijnt tijdens het spelen */
  .eq { display: none; align-items: flex-end; gap: 7px; height: 84px; }
  .eq i { width: 12px; background: #000; border-radius: 3px; animation: eq .8s ease-in-out infinite alternate; }
  .eq i:nth-child(1) { animation-delay: 0s; height: 30%; }
  .eq i:nth-child(2) { animation-delay: .15s; height: 80%; }
  .eq i:nth-child(3) { animation-delay: .3s; height: 55%; }
  .eq i:nth-child(4) { animation-delay: .1s; height: 95%; }
  .eq i:nth-child(5) { animation-delay: .25s; height: 45%; }
  @keyframes eq { to { transform: scaleY(.35); } }
  @media (prefers-reduced-motion: reduce) { .eq i { animation: none; } }
  .playing .eq { display: flex; }
  .playing .q, .playing .sub { display: none; }

  .time { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 22px; color: var(--accent); min-height: 28px; }

  .instruct { font-size: 15px; font-weight: 700; color: var(--accent); }
  .dock {
    position: relative; width: min(92vw, 380px); height: 80px;
    border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.5);
    background: var(--surface);
  }
  .cover {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: calc(100% - 92px);
    background: var(--surface); border-right: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; color: var(--muted); z-index: 2;
  }
  .ring {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 68px; height: 68px; border-radius: 50%;
    border: 3px solid var(--accent); pointer-events: none; z-index: 3;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { transform: translateY(-50%) scale(1.12); opacity: .5; } }
  @media (prefers-reduced-motion: reduce) { .ring { animation: none; } }
  .started .ring { display: none; }
  .started .cover { border-right-color: var(--line); }

  .btn { background: var(--surface); color: var(--text); border: 1px solid var(--line); border-radius: 12px; font: 500 15px 'Outfit', sans-serif; padding: 11px 16px; cursor: pointer; }
  .btn:active { background: var(--line); }
  button:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .note { font-size: 13px; color: var(--muted); max-width: 330px; }
  .warn { color: var(--accent); }
  .err { color: #FF8A7A; font-size: 14px; max-width: 340px; }
  #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 30vh; overflow: auto; background: #000; color: #7CFC9A; font: 11px monospace; text-align: left; padding: 8px; z-index: 99; }

  .setup { max-width: 420px; text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 22px; font-size: 15px; line-height: 1.6; }
  .setup h2 { font-family: 'Bricolage Grotesque', sans-serif; margin-bottom: 10px; }
  .setup code { display: block; background: var(--bg); border-radius: 8px; padding: 10px 12px; margin: 10px 0; font-size: 13px; color: var(--accent); word-break: break-all; }
  .setup a { color: var(--accent); }
</style>
</head>
<body>
<main id="app"></main>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const app = document.getElementById('app');
  const DEBUG = params.get('debug') === '1';
  let logEl = null;
  function log(m) {
    if (!DEBUG) return;
    if (!logEl) { logEl = document.createElement('div'); logEl.id = 'log'; document.body.appendChild(logEl); }
    logEl.textContent += m + "\n"; logEl.scrollTop = 1e9;
  }
  window.addEventListener('error', e => log('JS-fout: ' + e.message));

  // zelfde kleurverlopen als de geprinte kaartjes; willekeurig per ronde
  const GRADIENTS = [
    ['#7B2FBE','#B24BD8'], ['#F5D63D','#F0A93B'], ['#E0218A','#F06292'],
    ['#2E9BD6','#4FC3F7'], ['#5FD3BC','#A8E6CF'], ['#F26430','#F58F5D'],
    ['#43B649','#8BC34A'], ['#E53950','#EF7350']
  ];

  function parseTrackId(v) {
    v = decodeURIComponent((v || '').trim());
    const m = v.match(/track[\/:]([A-Za-z0-9]{22})/);
    if (m) return m[1];
    return /^[A-Za-z0-9]{22}$/.test(v) ? v : null;
  }
  function parseStart(v) {
    v = (v || '0').trim();
    if (/^\d+:\d{1,2}$/.test(v)) { const [m, s] = v.split(':').map(Number); return m * 60 + s; }
    const n = parseInt(v, 10); return isNaN(n) ? 0 : Math.max(0, n);
  }
  function fmt(sec) { sec = Math.max(0, Math.floor(sec)); return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0'); }

  const trackId = parseTrackId(params.get('track'));
  let startSec = parseStart(params.get('start'));

  if (!trackId) {
    app.innerHTML = `
      <div class="setup">
        <h2>Friendster-speler</h2>
        <p>Open deze pagina met een <strong>track</strong>- en <strong>start</strong>-parameter:</p>
        <code>?track=SPOTIFY_TRACK_ID&amp;start=45</code>
        <p>Voorbeeld (Coldplay – Yellow, vanaf 0:42):</p>
        <code><a href="?track=3AJwUDP919kvQ9QcozQPxg&start=42">?track=3AJwUDP919kvQ9QcozQPxg&amp;start=42</a></code>
        <p>Voeg <strong>&amp;debug=1</strong> toe voor een logvenster.</p>
      </div>`;
    return;
  }

  const [g1, g2] = GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)];
  app.innerHTML = `
    <div class="eyebrow">FRIENDSTER</div>
    <div class="card" id="card" style="background:linear-gradient(135deg, ${g1}, ${g2})">
      <div class="q">?</div>
      <div class="sub">wie &middot; wat &middot; wanneer</div>
      <div class="eq"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="brand">MYSTERY TRACK</div>
    </div>
    <div class="time" id="time">&nbsp;</div>
    <p class="instruct" id="instruct">&#9660; Tik op de play-knop om te starten</p>
    <div class="dock" id="dock">
      <div id="embed"></div>
      <div class="cover"><span>&#128584;</span><span>geheim, niet spieken</span></div>
      <div class="ring"></div>
    </div>
    <button class="btn" id="restart">&#8634; Naar startpunt (${fmt(startSec)})</button>
    <p class="note" id="note">Springt automatisch naar ${fmt(startSec)} zodra het speelt.</p>
    <p class="err" id="err" hidden></p>
  `;
  app.style.cssText += 'display:flex;flex-direction:column;align-items:center;gap:14px;';

  const card = document.getElementById('card');
  const timeEl = document.getElementById('time');
  const errEl = document.getElementById('err');
  const dock = document.getElementById('dock');
  const instruct = document.getElementById('instruct');
  const note = document.getElementById('note');
  function showErr(m) { errEl.textContent = m; errEl.hidden = false; }

  let controller = null;
  let needsSeek = startSec > 0, started = false;
  let seekTries = 0, lastSeek = 0, previewMode = null;

  const s = document.createElement('script');
  s.src = 'https://open.spotify.com/embed/iframe-api/v1';
  s.async = true;
  s.onerror = () => { showErr('Kon de Spotify-speler niet laden. Is er internet?'); log('script laden mislukt'); };
  document.body.appendChild(s);
  log('geladen, track=' + trackId + ' start=' + startSec);

  window.onSpotifyIframeApiReady = (IFrameAPI) => {
    log('API klaar');
    IFrameAPI.createController(
      document.getElementById('embed'),
      { uri: 'spotify:track:' + trackId, width: '100%', height: 80 },
      (EmbedController) => {
        controller = EmbedController;
        log('controller ok');

        controller.addListener('playback_update', (e) => {
          const d = e.data; if (!d) return;
          const pos = (d.position || 0) / 1000;
          const dur = (d.duration || 0) / 1000;
          log('upd paused=' + d.isPaused + ' pos=' + pos.toFixed(1) + ' dur=' + dur.toFixed(0));

          // previewmodus (niet ingelogd): nummer duurt ~30s, springen kan niet ver
          if (previewMode === null && dur > 0) {
            previewMode = dur < 35;
            if (previewMode) {
              needsSeek = false;
              note.innerHTML = '<span class="warn">&#9888; Previewmodus (30 sec).</span> Log in de browser in bij open.spotify.com voor het hele nummer.';
              log('previewmodus gedetecteerd');
            } else if (startSec > dur - 20) {
              startSec = Math.max(0, Math.floor(dur * 0.4));   // vangnet bij gek startpunt
              log('startpunt ingekort naar ' + startSec);
            }
          }

          card.classList.toggle('playing', !d.isPaused);
          timeEl.textContent = fmt(pos);
          if (!d.isPaused && !started) {
            started = true;
            dock.classList.add('started');
            instruct.textContent = 'Speelt! Pauzeren kan met dezelfde knop';
            instruct.style.color = 'var(--muted)';
          }

          // maximaal 2 voorzichtige sprongen, minstens 2 s uit elkaar — nooit een spring-loop
          const now = Date.now();
          if (needsSeek && !d.isPaused && pos < startSec - 2 && seekTries < 2 && now - lastSeek > 2000) {
            seekTries++; lastSeek = now;
            try { controller.seek(startSec); log('seek #' + seekTries + ' naar ' + startSec); }
            catch (err) { log('seek faalde: ' + err); }
          }
          if (pos >= startSec - 2 || seekTries >= 2) needsSeek = false;
        });

        controller.addListener('error', (e) => {
          log('embed-fout: ' + JSON.stringify(e));
          showErr('Afspelen lukt niet. Log in bij Spotify (open.spotify.com) en herlaad de pagina.');
        });
      }
    );
  };

  document.getElementById('restart').addEventListener('click', () => {
    if (!controller || previewMode) return;
    needsSeek = false; seekTries = 2;
    try { controller.seek(startSec); log('restart-seek'); } catch (e) { log('restart faalde: ' + e); }
  });
})();
</script>
</body>
</html>
