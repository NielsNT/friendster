<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mystery Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14101F; --surface: #201A31; --line: #352D4E;
    --accent: #FFB84D; --text: #F5EFE6; --muted: #8D84A6; --vinyl: #0B0812;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 20px; text-align: center;
  }
  .eyebrow { font-size: 12px; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(26px, 7vw, 38px); line-height: 1.05; margin-top: 4px; }
  h1 .q { color: var(--accent); }

  /* draaiende plaat = status, geen knop meer */
  .vinyl {
    width: min(44vw, 180px); height: min(44vw, 180px);
    border-radius: 50%; position: relative;
    background: radial-gradient(circle at center, var(--accent) 0 18%, var(--vinyl) 18.5% 100%);
    box-shadow: 0 0 0 1px var(--line), 0 18px 50px rgba(0,0,0,.55), inset 0 0 40px rgba(0,0,0,.6);
  }
  .vinyl::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: repeating-radial-gradient(circle at center, transparent 0 6px, rgba(255,255,255,.05) 6px 7px);
    -webkit-mask: radial-gradient(circle at center, transparent 0 19%, #000 20%);
            mask: radial-gradient(circle at center, transparent 0 19%, #000 20%);
  }
  .spinning { animation: spin 2.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinning { animation: none; } }

  .time { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 20px; color: var(--accent); min-height: 26px; }
  .chip { display: inline-block; font-size: 13px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 5px 13px; }

  /* de speler: echte Spotify-embed met afdekking, alleen play-knop vrij */
  .instruct { font-size: 15px; font-weight: 700; color: var(--accent); }
  .dock {
    position: relative; width: min(92vw, 380px); height: 80px;
    border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.5);
    background: var(--surface);
  }
  .dock iframe { display: block; }
  .cover {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: calc(100% - 92px);          /* rechterkant vrij voor de play-knop */
    background: var(--surface);
    border-right: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; color: var(--muted); z-index: 2;
  }
  .ring {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 68px; height: 68px; border-radius: 50%;
    border: 3px solid var(--accent); pointer-events: none; z-index: 3;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { transform: translateY(-50%) scale(1.12); opacity: .5; } }
  @media (prefers-reduced-motion: reduce) { .ring { animation: none; } }
  .started .ring { display: none; }
  .started .cover { border-right-color: var(--line); }

  .row { display: flex; gap: 10px; }
  .btn { background: var(--surface); color: var(--text); border: 1px solid var(--line); border-radius: 12px; font: 500 15px 'Outfit', sans-serif; padding: 11px 16px; cursor: pointer; }
  .btn:active { background: var(--line); }
  button:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .hint { font-size: 13px; color: var(--muted); max-width: 320px; }
  .err { color: #FF8A7A; font-size: 14px; max-width: 340px; }
  #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 30vh; overflow: auto; background: #000; color: #7CFC9A; font: 11px monospace; text-align: left; padding: 8px; z-index: 99; }

  .setup { max-width: 420px; text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 22px; font-size: 15px; line-height: 1.6; }
  .setup h2 { font-family: 'Bricolage Grotesque', sans-serif; margin-bottom: 10px; }
  .setup code { display: block; background: var(--bg); border-radius: 8px; padding: 10px 12px; margin: 10px 0; font-size: 13px; color: var(--accent); word-break: break-all; }
  .setup a { color: var(--accent); }
</style>
</head>
<body>
<main id="app"></main>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const app = document.getElementById('app');
  const DEBUG = params.get('debug') === '1';
  let logEl = null;
  function log(msg) {
    if (!DEBUG) return;
    if (!logEl) { logEl = document.createElement('div'); logEl.id = 'log'; document.body.appendChild(logEl); }
    logEl.textContent += msg + "\n"; logEl.scrollTop = 1e9;
  }
  window.addEventListener('error', e => log('JS-fout: ' + e.message));

  function parseTrackId(v) {
    v = decodeURIComponent((v || '').trim());
    const m = v.match(/track[\/:]([A-Za-z0-9]{22})/);
    if (m) return m[1];
    return /^[A-Za-z0-9]{22}$/.test(v) ? v : null;
  }
  function parseStart(v) {
    v = (v || '0').trim();
    if (/^\d+:\d{1,2}$/.test(v)) { const [m, s] = v.split(':').map(Number); return m * 60 + s; }
    const n = parseInt(v, 10); return isNaN(n) ? 0 : Math.max(0, n);
  }
  function fmt(sec) { sec = Math.max(0, Math.floor(sec)); return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0'); }

  const trackId = parseTrackId(params.get('track'));
  const startSec = parseStart(params.get('start'));

  if (!trackId) {
    app.innerHTML = `
      <div class="setup">
        <h2>Friendster-speler</h2>
        <p>Open deze pagina met een <strong>track</strong>- en <strong>start</strong>-parameter:</p>
        <code>?track=SPOTIFY_TRACK_ID&amp;start=45</code>
        <p>Voorbeeld (Coldplay – Yellow, vanaf 0:42):</p>
        <code><a href="?track=3AJwUDP919kvQ9QcozQPxg&start=42">?track=3AJwUDP919kvQ9QcozQPxg&amp;start=42</a></code>
        <p>Voeg <strong>&amp;debug=1</strong> toe om een logvenster te zien.</p>
      </div>`;
    return;
  }

  app.innerHTML = `
    <div>
      <div class="eyebrow">Friendster &middot; Ronde</div>
      <h1>Mystery <span class="q">Track</span></h1>
    </div>
    <div class="vinyl" id="disc"></div>
    <div class="time" id="time">&nbsp;</div>
    <p class="instruct" id="instruct">&#9660; Tik op de play-knop om te starten</p>
    <div class="dock" id="dock">
      <div id="embed"></div>
      <div class="cover"><span>&#128584;</span><span>geheim, niet spieken</span></div>
      <div class="ring"></div>
    </div>
    <div class="row">
      <button class="btn" id="restart">&#8634; Naar startpunt (${fmt(startSec)})</button>
    </div>
    <p class="hint">Het nummer springt automatisch naar ${fmt(startSec)} zodra het speelt.</p>
    <p class="err" id="err" hidden></p>
  `;
  app.style.cssText += 'display:flex;flex-direction:column;align-items:center;gap:14px;';

  const disc = document.getElementById('disc');
  const timeEl = document.getElementById('time');
  const errEl = document.getElementById('err');
  const dock = document.getElementById('dock');
  const instruct = document.getElementById('instruct');
  function showErr(msg) { errEl.textContent = msg; errEl.hidden = false; }

  let controller = null, needsSeek = true, started = false;

  const s = document.createElement('script');
  s.src = 'https://open.spotify.com/embed/iframe-api/v1';
  s.async = true;
  s.onerror = () => { showErr('Kon de Spotify-speler niet laden. Is er internet?'); log('script laden mislukt'); };
  document.body.appendChild(s);
  log('pagina geladen, track=' + trackId + ' start=' + startSec);

  window.onSpotifyIframeApiReady = (IFrameAPI) => {
    log('iFrame API klaar');
    IFrameAPI.createController(
      document.getElementById('embed'),
      { uri: 'spotify:track:' + trackId, width: '100%', height: 80 },
      (EmbedController) => {
        controller = EmbedController;
        log('controller aangemaakt');

        controller.addListener('ready', () => {
          log('embed ready');
          try { controller.seek(startSec); log('pre-seek naar ' + startSec); } catch (e) { log('pre-seek faalde: ' + e); }
        });

        controller.addListener('playback_update', (e) => {
          const d = e.data; if (!d) return;
          const pos = (d.position || 0) / 1000;
          log('update: paused=' + d.isPaused + ' pos=' + pos.toFixed(1));
          disc.classList.toggle('spinning', !d.isPaused);
          timeEl.textContent = fmt(pos);
          if (!d.isPaused && !started) {
            started = true;
            dock.classList.add('started');
            instruct.textContent = 'Speelt \u2014 pauzeren kan met dezelfde knop';
            instruct.style.color = 'var(--muted)';
          }
          if (needsSeek && !d.isPaused && pos < startSec - 1) {
            try { controller.seek(startSec); log('seek naar ' + startSec); } catch (err) { log('seek faalde: ' + err); }
          }
          if (pos >= startSec - 1) needsSeek = false;
        });

        controller.addListener('error', (e) => {
          log('embed-fout: ' + JSON.stringify(e));
          showErr('Afspelen lukt niet. Log in de browser in bij Spotify (open.spotify.com) en herlaad.');
        });
      }
    );
  };

  document.getElementById('restart').addEventListener('click', () => {
    if (!controller) return;
    needsSeek = false;
    try { controller.seek(startSec); log('restart-seek'); } catch (e) { log('restart faalde: ' + e); }
  });
})();
</script>
</body>
</html>
